services:

  backend:
    build: ./spring-boot-appm
    container_name: backend
    ports:
      - "8080:8080"
    env_file:
      - ./spring-boot-appm/.env
    depends_on:
      - mysql
    networks:
      - app-network

  frontend:
    build: ./E-studentApp
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

  mysql:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: lms-portal
    ports:
      - "3309:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-network

volumes:
  mysql-data:

networks:
  app-network:

